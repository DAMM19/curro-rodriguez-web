name: Actualizar Diario del CEO

on:
  schedule:
    - cron: "0 9 1 * *"  # Día 1 de cada mes a las 11:00 Madrid (9:00 UTC)
  workflow_dispatch:      # También se puede lanzar manualmente

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run update script
        run: python scripts/update_diario.py

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "Sin columnas nuevas. No se hace commit."
          else
            git commit -m "auto: nueva columna en Diario del CEO [$(date +'%Y-%m-%d')]"
            git push
            echo "✅ Nueva columna publicada."
          fi
