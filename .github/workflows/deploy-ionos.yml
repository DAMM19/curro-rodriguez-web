name: Deploy to IONOS
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install lftp
        run: sudo apt-get install -y lftp
      - name: Deploy all files to IONOS via SFTP
        env:
          LFTP_PASSWORD: ${{ secrets.IONOS_FTP_PASS }}
        run: |
          lftp -u "${{ secrets.IONOS_FTP_USER }},${LFTP_PASSWORD}" \
            "sftp://${{ secrets.IONOS_FTP_HOST }}:22" \
            -e "set sftp:auto-confirm yes; set net:timeout 30; \
                mirror -R --delete \
                --exclude=\.git/ --exclude=\.github/ --exclude=scripts/ \
                . ${{ secrets.IONOS_FTP_PATH }}; bye"

