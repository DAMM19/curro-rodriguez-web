name: Deploy to IONOS
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install sshpass
        run: sudo apt-get install -y sshpass
      - name: Deploy to IONOS via SFTP
        env:
          SSHPASS: ${{ secrets.IONOS_FTP_PASS }}
          FTP_USER: ${{ secrets.IONOS_FTP_USER }}
          FTP_HOST: ${{ secrets.IONOS_FTP_HOST }}
          FTP_PATH: ${{ secrets.IONOS_FTP_PATH }}
        run: |
          sshpass -e sftp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -P 22 "${FTP_USER}@${FTP_HOST}" <<EOF
          cd ${FTP_PATH}
          put index.html
          bye
          EOF
